spring.application.name=crm-backend
# Puerto de la aplicaci�n
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/crm_backend
spring.datasource.username=postgres
spring.datasource.password=harold_dev0530


spring.jpa.hibernate.ddl-auto=update
#puebla en automatico la BD, ejecutando data.sql
spring.sql.init.mode=never
#evita errores si Hibernate no ha creado las tablas
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Logging
logging.level.org.springframework=INFO
logging.level.com.startupcrm=DEBUG

server.error.include-stacktrace=never
server.error.include-message=never

# Email Configuration (SMTP - Brevo/Gmail)
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:tu_email@ejemplo.com}
spring.mail.password=${MAIL_PASSWORD:tu_contraseña}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM:noreply@crm.com}

# WhatsApp Cloud API Configuration (Meta)
# Obtener estos valores desde: https://developers.facebook.com/apps
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.business-account-id=${WHATSAPP_BUSINESS_ACCOUNT_ID:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
spring.mail.password=${MAIL_PASSWORD:tu_contraseña}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=${MAIL_FROM:noreply@crm.com}