spring.application.name=crm-backend
# Puerto de la aplicación
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/crm_backend
spring.datasource.username=postgres
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=update
#No puebla automáticamente - los datos deben ser importados manualmente
spring.sql.init.mode=never
#spring.sql.init.data-locations=classpath:data_poblada.sql
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson Configuration - Enums deserialization
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.startupcrm=DEBUG

server.error.include-stacktrace=never
server.error.include-message=never

# Email Configuration (SMTP - Brevo/Gmail)
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM:noreply@crm.com}

# WhatsApp Cloud API Configuration (Meta)
# Obtener estos valores desde: https://developers.facebook.com/apps
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.business-account-id=${WHATSAPP_BUSINESS_ACCOUNT_ID:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}