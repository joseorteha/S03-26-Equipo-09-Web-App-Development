spring.application.name=crm-backend
# Puerto de la aplicación
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/crm_backend
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.jpa.hibernate.ddl-auto=update
#puebla en automatico la BD, ejecutando data.sql
#spring.sql.init.mode=always
spring.sql.init.mode=never
#evita errores si Hibernate no ha creado las tablas
#spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.org.springframework=INFO
logging.level.com.startupcrm=DEBUG

server.error.include-stacktrace=never
server.error.include-message=never

#ejecuta DatatableSeeder en dev
spring.profiles.active=dev
