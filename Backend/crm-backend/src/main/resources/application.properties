spring.application.name=crm-backend
# Application Port
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/crm_backend}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
# Populate DB automatically, executing data.sql
#spring.sql.init.mode=always
spring.sql.init.mode=never
# Avoid errors if Hibernate has not created the tables yet
#spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.org.springframework=INFO
logging.level.com.startupcrm=DEBUG

server.error.include-stacktrace=never
server.error.include-message=never

# Activate profiles
spring.profiles.active=dev
